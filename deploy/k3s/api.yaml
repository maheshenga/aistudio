# Image tags: build with scripts/k3s-build-images.ps1 (default aistudio/api:latest, aistudio/web:latest)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: aistudio
  labels:
    app: api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      initContainers:
        - name: wait-for-db
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z db.aistudio.svc.cluster.local 5432; do
                echo waiting for postgres...
                sleep 2
              done
      containers:
        - name: api
          image: aistudio/api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 4000
          env:
            - name: PORT
              value: "4000"
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: aistudio-db
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: aistudio-db
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: aistudio-db
                  key: POSTGRES_DB
            - name: DATABASE_URL
              value: postgresql://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@db:5432/$(POSTGRES_DB)?schema=public
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: aistudio-api
                  key: JWT_SECRET
            - name: FIELD_ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: aistudio-api
                  key: FIELD_ENCRYPTION_KEY
            - name: JWT_ACCESS_TTL
              valueFrom:
                secretKeyRef:
                  name: aistudio-api
                  key: JWT_ACCESS_TTL
                  optional: true
            - name: JWT_REFRESH_TTL_DAYS
              valueFrom:
                secretKeyRef:
                  name: aistudio-api
                  key: JWT_REFRESH_TTL_DAYS
                  optional: true
            - name: CORS_ORIGINS
              valueFrom:
                secretKeyRef:
                  name: aistudio-api
                  key: CORS_ORIGINS
            - name: ORCHESTRATION_RECONCILE_ENABLED
              valueFrom:
                secretKeyRef:
                  name: aistudio-api
                  key: ORCHESTRATION_RECONCILE_ENABLED
                  optional: true
            - name: MULTICA_API_URL
              valueFrom:
                secretKeyRef:
                  name: aistudio-api
                  key: MULTICA_API_URL
                  optional: true
            - name: MULTICA_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: aistudio-api
                  key: MULTICA_API_TOKEN
                  optional: true
          readinessProbe:
            httpGet:
              path: /
              port: 4000
            initialDelaySeconds: 15
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: aistudio
  labels:
    app: api
spec:
  type: NodePort
  selector:
    app: api
  ports:
    - name: http
      port: 4000
      targetPort: 4000
      nodePort: 30400