# Copy to secret.env (gitignored) from .env.deploy — see README.md
apiVersion: v1
kind: Secret
metadata:
  name: aistudio-db
  namespace: aistudio
type: Opaque
stringData:
  POSTGRES_USER: postgres
  POSTGRES_PASSWORD: change-me-strong-password
  POSTGRES_DB: aistudio
---
apiVersion: v1
kind: Secret
metadata:
  name: aistudio-api
  namespace: aistudio
type: Opaque
stringData:
  JWT_SECRET: ""
  FIELD_ENCRYPTION_KEY: ""
  # Optional overrides (defaults in deployment if omitted)
  JWT_ACCESS_TTL: "15m"
  JWT_REFRESH_TTL_DAYS: "30"
  ORCHESTRATION_RECONCILE_ENABLED: "false"
  MULTICA_API_URL: ""
  MULTICA_API_TOKEN: ""
  CORS_ORIGINS: "http://localhost:8080"