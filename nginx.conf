server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Long-cache fingerprinted assets emitted by Vite.
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # SPA history fallback: every unknown path resolves to index.html so the
  # client-side router can handle it.
  location / {
    try_files $uri $uri/ /index.html;
  }
}
